variables:
  PROJECT_NAME: demo-pipeline
  PYTHON_VERSION: "3.11"
  ENV: production

stages:
  - lint
  - test
  - build
  - deploy

jobs:
  lint:
    stage: lint
    image: python:3.11-slim
    script:
      - pip install ruff
      - ruff check src/

  unit_test:
    stage: test
    image: python:3.11-slim
    script:
      - pip install -r requirements.txt
      - pytest tests/ -v

  build_package:
    stage: build
    image: python:3.11-slim
    script:
      - python -m build
    artifacts:
      paths:
        - dist/

  deploy_prod:
    stage: deploy
    image: alpine:latest
    only:
      - main
    script:
      - echo "Deploying $PROJECT_NAME to $ENV"
